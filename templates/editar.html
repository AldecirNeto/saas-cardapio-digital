<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

    <div class="box-editar">
        {# produto.id em vez de produto[0] #}
        <h2 style="margin-top: 0; color: #2c3e50;">✏️ Editar Produto #{{ produto.id }}</h2>
        
        <form action="/admin/editar/{{ produto.id }}" method="POST" enctype="multipart/form-data">
            <label>Nome do Lanche:</label>
            {# produto.nome em vez de produto[1] #}
            <input type="text" name="nome" value="{{ produto.nome }}" required>

            <label>Descrição / Ingredientes <small style="color: #7f8c8d; font-weight: normal;">(Opcional)</small>:</label>           
            {# produto.descricao em vez de produto[8] #}
            <textarea name="descricao" rows="3" style="width: 100%; padding: 14px 15px; margin-bottom: 20px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; background-color: #fdfdfd; font-family: inherit; font-size: 15px; transition: 0.3s; resize: vertical;">{{ produto.descricao if produto.descricao }}</textarea>

            <label>Preço (R$):</label>
            {# produto.preco em vez de produto[2] #}
            <input type="number" step="0.01" name="preco" value="{{ produto.preco }}" required>

            <label>Categoria:</label>
            <select name="categoria" required style="width: 100%; padding: 14px 15px; margin-bottom: 20px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; background-color: #fdfdfd; font-family: inherit; font-size: 16px;">
                {% for cat in categorias_atuais %}
                    {# cat.nome em vez de cat[1] e produto.categoria em vez de produto[3] #}
                    <option value="{{ cat.nome }}" {% if produto.categoria == cat.nome %}selected{% endif %}>
                        {{ cat.nome }}
                    </option>
                {% else %}
                    <option value="Geral">Geral</option>
                {% endfor %}
            </select>
            
            <label>Nova Foto (Opcional):</label>
            <small style="display: block; color: #888; margin-bottom: 5px;">Deixe em branco para manter a foto atual.</small>
            <input type="file" name="imagem" accept="image/*" style="background: #fff; padding: 5px;">

            <button type="submit">💾 Salvar Alterações</button>
        </form>
        
        <a href="/admin" class="btn-voltar">⬅️ Cancelar e Voltar</a>
    </div>

</body>
</html>
